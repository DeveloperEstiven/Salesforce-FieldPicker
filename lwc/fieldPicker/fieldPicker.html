<template>
  <div if:true={relationshipPath} class="flex gap-small">
      <lightning-button label="Change Field" onclick={handleChangeField}></lightning-button>
      <p>
          <span if:false={isBaseObjectHidden} class="slds-badge">{baseObject}</span>
          <span class="slds-badge">
              <span if:true={fieldTypeIcon} class="slds-badge__icon slds-badge__icon_left">
                  <lightning-icon icon-name={fieldTypeIcon} alternative-text="Field type" size="x-small"></lightning-icon>
              </span>
              {relationshipPath}
          </span>
      </p>
  </div>

  <lightning-button if:false={relationshipPath} label="Select Field" onclick={handleOpenModal}></lightning-button>

  <template if:true={isModalOpen}>
      <section role="dialog" tabindex="-1" class={modalClass}>
          <div class="slds-modal__container">
              <div class="slds-is-relative">
                  <lightning-spinner if:true={isLoading} alternative-text="Loading" size="medium"></lightning-spinner>
                  <header class="slds-modal__header">
                      <h2 class="slds-text-heading_medium">Select a Field</h2>
                  </header>

                  <div class="modal-content slds-modal__content slds-p-around_medium">
                      <lightning-combobox if:false={baseObject} label="Select Base Object" options={objectOptions} value={baseObject} placeholder="Select an object" onchange={handleObjectChange}></lightning-combobox>

                      <div if:true={baseObject} class="min-height slds-grid slds-wrap">
                          <!-- Left Column: Object Library -->
                          <section class="object-library max-height slds-col slds-size_1-of-3 slds-scrollable_y">
                              <div class="sticky-header">
                                  <p class="slds-p-vertical_x-small slds-text-title_caps"><strong>Object Library</strong></p>
                              </div>

                              <div class="item" onclick={handleBaseObjectClick} data-field={baseObject}>
                                  <strong>{baseObjectLabel}</strong>
                              </div>

                              <div class="lookup-list">
                                  <template for:each={lookupFieldsHierarchy} for:item="lookupField">
                                      <template if:false={lookupField.isDisabled}>
                                          <div key={lookupField.key} class="item" data-field={lookupField.key} onmouseover={handleHoverField} onmouseleave={handleHoverOut} onclick={handleLookupClick}>
                                              {lookupField.label}
                                          </div>
                                          <!-- Nested Lookup Fields -->
                                          <template if:true={lookupField.isExpanded} for:each={lookupField.childLookupFields} for:item="childField">
                                              <template if:false={childField.isDisabled}>
                                                  <div key={childField.key} class="item slds-m-left_x-large" data-field={childField.key} onmouseover={handleHoverField} onmouseleave={handleHoverOut} onclick={handleChildLookupClick}>
                                                      {childField.label}
                                                  </div>
                                              </template>
                                          </template>
                                      </template>
                                  </template>
                              </div>
                          </section>

                          <!-- Right Column: Field List -->
                          <section class="max-height slds-col slds-size_2-of-3 slds-p-left_small slds-scrollable_y">
                              <div class="sticky-header slds-var-p-bottom_xx-small">
                                  <div class="flex" style="justify-content: space-between;">
                                      <p class="slds-var-p-vertical_x-small slds-text-title_caps"><strong>Related Fields for {currentObject}</strong></p>
                                      <p if:true={fieldSelectionMessage} class="slds-text-body_small slds-text-color_weak"><em>{fieldSelectionMessage}</em></p>
                                  </div>
                                  <lightning-input class="slds-var-m-top_xx-small" type="search" label="Search Fields" value={searchTerm} onchange={handleSearchChange}></lightning-input>
                              </div>

                              <template if:true={filteredFields.length} for:each={filteredFields} for:item="field">
                                  <div key={field.value} class="flex check-item item" data-field={field.value} onmouseleave={handleHoverOut} onmouseover={handleHoverField} onclick={handleFieldClick}>
                                      <lightning-icon icon-name={field.iconName} alternative-text="Field type" size="x-small"></lightning-icon>
                                      <span>{field.label}</span>
                                  </div>
                              </template>

                              <template if:false={filteredFields.length}>
                                  <p>No fields available.</p>
                              </template>
                          </section>
                      </div>
                  </div>

                  <div if:true={baseObject} class="api-name-section slds-text-body_regular slds-text-color_weak">
                      <p class="slds-m-bottom_xx-small"><strong>API Name: </strong> <span>{hoveredField}</span></p>
                      <p><strong>Selected Field: </strong><span class="slds-badge">{currentRelationshipPath}</span></p>
                  </p>
                  </div>

                  <footer class="slds-modal__footer">
                      <lightning-button variant="neutral" label="Close" onclick={handleCloseModal} class="slds-m-right_x-small"></lightning-button>
                      <lightning-button variant="brand" label="Select" onclick={handleFieldSelect} disabled={isSelectDisabled}></lightning-button>
                  </footer>
              </div>
          </div>
      </section>
      <div class="slds-backdrop slds-backdrop_open" style="width: 100vw;left: calc(-50vw + 50%);"></div>
  </template>
</template>
